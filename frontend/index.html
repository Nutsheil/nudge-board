<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nudge Board</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #ffffff;
        color: #08060d;
        font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #16171d;
          color: #f3f4f6;
        }
      }

      #root {
        min-height: 100%;
      }

      .app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .app-splash__spinner {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid rgba(170, 59, 255, 0.2);
        border-top-color: #aa3bff;
        animation: app-splash-spin 0.8s linear infinite;
      }

      @media (prefers-color-scheme: dark) {
        .app-splash__spinner {
          border-color: rgba(192, 132, 252, 0.2);
          border-top-color: #c084fc;
        }
      }

      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-splash">
        <div class="app-splash__spinner" aria-label="Loading" role="status"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
